version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
      - "5679:5679"
    environment:
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-token
      - N8N_NATIVE_PYTHON_RUNNER=true
      - DB_SQLITE_POOL_SIZE=2                       # Убирает deprecation warning
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false          # Убирает deprecation warning
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=300        # Увеличивает таймаут до 5 минут
    volumes:
      - ./n8n:/home/node/.n8n
    networks:
      - n8n-network
    restart: unless-stopped

  n8n-runners:
    build: .
    container_name: n8n-runners
    user: "1000:1000"
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json   # <-- вот эта строка
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-token
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    networks:
      - n8n-network
    restart: unless-stopped
    depends_on:
      - n8n          # Гарантирует, что n8n запустится первым

networks:
  n8n-network:
    driver: bridge